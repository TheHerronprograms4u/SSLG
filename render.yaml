services:
  # Backend Server
  - type: web
    name: sslg-backend
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install && npx tsc
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5000

  # Frontend Client
  - type: web
    name: sslg-frontend
    runtime: static
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: sslg-backend
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
